version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pettrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pettrack}
      POSTGRES_DB: ${POSTGRES_DB:-pettrack}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-pettrack}:${POSTGRES_PASSWORD:-pettrack}@db:5432/${POSTGRES_DB:-pettrack}
      AUTH_SECRET: ${AUTH_SECRET}
      POSTGRES_USER: ${POSTGRES_USER:-pettrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pettrack}
      POSTGRES_DB: ${POSTGRES_DB:-pettrack}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      - db
    ports:
      - "3000:3000"

volumes:
  postgres_data:
